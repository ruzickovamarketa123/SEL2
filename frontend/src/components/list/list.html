<div class="tour-list-container">

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
    <h2 class="list-title">Available Tours</h2>
    <button type="button" (click)="vm.showAddModal.set(true)" style="
      padding: 7px 14px;
      background: #5c6bc0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    ">+ Add Tour</button>
  </div>

  <div class="scroll-area">
    @for (tour of vm.filteredTours(); track tour.id) {
      <div
        class="tour-card"
        [class.selected]="vm.selectedId() === tour.id"
        (click)="select(tour)"
      >
        <div class="card-header">
          <h3 class="tour-name">{{ tour.name }}</h3>
          <span class="type-badge">{{ tour.transportType }}</span>
        </div>

        <div class="card-details">
          <div class="route">
            <span class="route-point">{{ tour.from }}</span>
            <span class="route-arrow">→</span>
            <span class="route-point">{{ tour.to }}</span>
          </div>
        </div>
      </div>
    } @empty {
      <p>No tours found matching your search.</p>
    }
  </div>
</div>

<div *ngIf="vm.showAddModal()" style="
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
">
  <div style="background: white; padding: 24px; border-radius: 12px; width: 400px;">
    <h3 style="margin: 0 0 16px 0;">Add New Tour</h3>

    <div style="display: flex; flex-direction: column; gap: 12px;">
      <input type="text"
        [ngModel]="vm.newTour().name"
        (ngModelChange)="vm.newTour.set({...vm.newTour(), name: $event})"
        placeholder="Name"
        style="padding: 8px; border-radius: 8px; border: 1px solid #eee;">

      <input type="text"
        [ngModel]="vm.newTour().description"
        (ngModelChange)="vm.newTour.set({...vm.newTour(), description: $event})"
        placeholder="Description"
        style="padding: 8px; border-radius: 8px; border: 1px solid #eee;">

      <input type="text"
        [ngModel]="vm.newTour().from"
        (ngModelChange)="vm.newTour.set({...vm.newTour(), from: $event})"
        placeholder="From"
        style="padding: 8px; border-radius: 8px; border: 1px solid #eee;">

      <input type="text"
        [ngModel]="vm.newTour().to"
        (ngModelChange)="vm.newTour.set({...vm.newTour(), to: $event})"
        placeholder="To"
        style="padding: 8px; border-radius: 8px; border: 1px solid #eee;">

      <select
        [ngModel]="vm.newTour().transportType"
        (ngModelChange)="vm.newTour.set({...vm.newTour(), transportType: $event})"
        style="padding: 8px; border-radius: 8px; border: 1px solid #eee;">
        <option value="" disabled>Select transport type</option>
        <option value="Hike">Hike</option>
        <option value="Bike">Bike</option>
        <option value="Running">Running</option>
        <option value="Vacation">Vacation</option>
      </select>
    </div>

    <div style="display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px;">
      <button type="button" (click)="vm.showAddModal.set(false)">Cancel</button>
      <button type="button" (click)="vm.addTour()">Add</button>
    </div>
  </div>
</div>
