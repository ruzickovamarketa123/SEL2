<div class="tour-list-container">

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
    <h2 class="list-title">available Tours</h2>
    <button type="button" (click)="vm.openAddModal()" style="
      padding: 8px 18px;
      background: rgb(239, 125, 184);
      color: rgb(0, 0, 0);
      border: 1.5px solid #000000;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    ">+ add tour</button>
  </div>

  <div class="scroll-area">
    @for (tour of vm.filteredTours(); track tour.id) {
      <div
        class="tour-card"
        [class.selected]="vm.selectedId() === tour.id"
        (click)="select(tour)"
      >
        <div class="card-header">
          <h3 class="tour-name">{{ tour.name }}</h3>
          <span class="type-badge">{{ tour.transportType }}</span>
        </div>

        <div class="card-details">
          <div class="route">
            <span class="route-point">{{ tour.from }}</span>
            <span class="route-arrow">→</span>
            <span class="route-point">{{ tour.to }}</span>
          </div>
        </div>
      </div>
    } @empty {
      <p>No tours found matching your search.</p>
    }
  </div>
</div>

@if (vm.showAddModal()) {
<div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100;">
  <div style="background: white; padding: 24px; border-radius: 12px; width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
    <h3 style="margin: 0 0 16px 0;">Add New Tour</h3>

    <div style="display: flex; flex-direction: column; gap: 12px;">
      <input type="text" 
        [ngModel]="vm.newTour().name" 
        (ngModelChange)="vm.newTour.set({...vm.newTour(), name: $event})" 
        placeholder="Tour Name" 
        style="padding: 10px; border-radius: 8px; border: 1px solid #ccc;">

      <input type="text" 
        [ngModel]="vm.newTour().from" 
        (ngModelChange)="vm.newTour.set({...vm.newTour(), from: $event})" 
        placeholder="From (Departure)" 
        style="padding: 10px; border-radius: 8px; border: 1px solid #ccc;">

      <input type="text" 
        [ngModel]="vm.newTour().to" 
        (ngModelChange)="vm.newTour.set({...vm.newTour(), to: $event})" 
        placeholder="To (Destination)" 
        style="padding: 10px; border-radius: 8px; border: 1px solid #ccc;">

      <textarea 
        [ngModel]="vm.newTour().description" 
        (ngModelChange)="vm.newTour.set({...vm.newTour(), description: $event})" 
        placeholder="Tour Description" 
        style="padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-family: inherit; resize: vertical;" rows="3"></textarea>


      <select 
        [ngModel]="vm.newTour().transportType" 
        (ngModelChange)="vm.newTour.set({...vm.newTour(), transportType: $event})" 
        style="padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
        <option [value]="null" disabled selected>Select transport type</option>
        <option value="Hike">Hike</option>
        <option value="Bike">Bike</option>
        <option value="Running">Running</option>
        <option value="Vacation">Vacation</option>
      </select>
    </div>

    <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
      <button type="button" (click)="vm.closeAddModal()" style="padding: 8px 16px; border: none; background: #eee; border-radius: 6px; cursor: pointer;">Cancel</button>
      <button type="button" (click)="vm.addTour()" style="padding: 8px 16px; border: none; background: rgb(239, 125, 184); color: white; border-radius: 6px; cursor: pointer; font-weight: bold;">Add Tour</button>
    </div>
  </div>
</div>
}
