<div style="display: flex; gap: 8px; align-items: center;">
  <input 
    #searchInput
    type="text" 
    placeholder="Search for your dream tour..." 
    style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd;"
    (input)="onTyping(searchInput.value)">
    
  <button 
    type="button" 
    (click)="vm.showModal.set(true)"
    style="padding: 10px 16px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer;">
    + Add Tour
  </button>
</div>

<div *ngIf="vm.showModal()" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
  <div style="background: white; padding: 24px; border-radius: 12px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
    <h3 style="margin-top: 0;">Add New Tour</h3>

    <div style="display: flex; flex-direction: column; gap: 12px;">
      <input #nameInput type="text" placeholder="Name" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
      <input #descInput type="text" placeholder="Description" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
      <input #fromInput type="text" placeholder="From" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
      <input #toInput type="text" placeholder="To" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
      
      <select #typeInput style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
        <option value="Hike">Hike</option>
        <option value="Bike">Bike</option>
        <option value="Running">Running</option>
        <option value="Vacation">Vacation</option>
      </select>
    </div>

    <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
      <button type="button" (click)="vm.showModal.set(false)" style="padding: 8px 16px; background: #eee; border: none; border-radius: 4px;">Cancel</button>
      <button type="button" (click)="addTour(nameInput.value, descInput.value, fromInput.value, toInput.value, typeInput.value)" style="padding: 8px 16px; background: #28a745; color: white; border: none; border-radius: 4px;">Add Tour</button>
    </div>
  </div>
</div>
