@if (vm.tour(); as tour) {
  <div class="tour-details-container">
    <div class="details-header">
      <h1 class="tour-title">{{ tour.name }}</h1>
      <button class="close-btn" (click)="onClose()" title="Close details">×</button>
    </div>

    <div class="details-content">
      <div class="info-grid">
        <div class="info-item">
          <span class="label">from: </span>
          <span class="value">{{ tour.from }}</span>
        </div>
        <div class="info-item">
          <span class="label">to: </span>
          <span class="value">{{ tour.to }}</span>
        </div>
        <div class="info-item">
          <span class="label">type: </span>
          <span class="value">{{ tour.transportType }}</span>
        </div>
        <div class="info-item">
          <span class="label">distance: </span>
          <span class="value">{{ tour.distance }} km</span>
        </div>
        <div class="info-item">
          <span class="label">duration: </span>
          <span class="value">{{ tour.estimatedTime }} min</span>
        </div>
      </div>

      <div class="description-section">
        <h3>description</h3>
        <p>{{ tour.description || 'no description available for this tour.' }}</p>
      </div>
    </div>
  </div>
}
