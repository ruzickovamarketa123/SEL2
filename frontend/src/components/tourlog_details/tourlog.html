<div class="log-details-container" style="height: 100%;">
  @if (vm.selectedLog(); as log) {
    <div style="background: #fcfcfc; border: 1px solid #f0f0f0; border-radius: 12px; padding: 20px; height: 100%;">
      
      @if (!vm.isEditing()) {
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 12px;">
          <h4 style="margin: 0; color: #333;">Log Details</h4>
          <div style="display: flex; gap: 8px;">
            <button (click)="vm.startEdit()" 
                    style="background: #e7f3ff; color: #007bff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;">
              ✎ Edit
            </button>
            <button (click)="onDelete()" 
                    style="background: #fff0f0; color: #dc3545; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;">
              🗑 Delete
            </button>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
          <div>
            <label style="display: block; font-size: 11px; color: #999; text-transform: uppercase;">Duration</label>
            <span style="font-weight: 600;">{{ log.totalTime }} min</span>
          </div>
          <div>
            <label style="display: block; font-size: 11px; color: #999; text-transform: uppercase;">Difficulty</label>
            <span style="font-weight: 600;">{{ log.difficulty }}</span>
          </div>
          <div>
            <label style="display: block; font-size: 11px; color: #999; text-transform: uppercase;">Distance</label>
            <span style="font-weight: 600;">{{ log.totalDistance }} km</span>
          </div>
          <div>
            <label style="display: block; font-size: 11px; color: #999; text-transform: uppercase;">Rating</label>
            <span style="color: #ffc107; font-weight: bold;">{{ log.rating }}/5 ★</span>
          </div>
        </div>

        <div style="margin-top: 10px;">
          <label style="display: block; font-size: 11px; color: #999; text-transform: uppercase;">User Comment</label>
          <p style="margin: 5px 0; font-size: 14px; color: #555; line-height: 1.5; background: white; padding: 12px; border-radius: 8px; border: 1px solid #f0f0f0;">
            {{ log.comment }}
          </p>
        </div>
      } 
      
      @else {
        <h4 style="margin-top: 0; color: #007bff; border-bottom: 1px solid #007bff; padding-bottom: 8px;">✎ Edit Log</h4>
        
        <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px;">
          <div>
            <label style="font-size: 11px; color: #888;">Distance (km)</label>
            <input type="number" 
              [ngModel]="vm.editData()?.totalDistance" 
              (ngModelChange)="vm.editData.set({...vm.editData()!, totalDistance: $event})"
              style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
          </div>
          <div>
            <label style="font-size: 11px; color: #888;">Comment</label>
            <textarea 
              [ngModel]="vm.editData()?.comment" 
              (ngModelChange)="vm.editData.set({...vm.editData()!, comment: $event})"
              rows="3" 
              style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit;"></textarea>
          </div>
          
          <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
            <button (click)="vm.cancelEdit()" style="padding: 8px 16px; border: none; background: #eee; border-radius: 6px; cursor: pointer;">Cancel</button>
            <button (click)="onSave()" style="padding: 8px 16px; border: none; background: #007bff; color: white; border-radius: 6px; cursor: pointer; font-weight: bold;">Save Changes</button>
          </div>
        </div>
      }
    </div>
  } @else {
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #bbb; border: 2px dashed #f0f0f0; border-radius: 12px;">
      <span style="font-size: 30px; margin-bottom: 10px;">📋</span>
      <p style="margin: 0; font-size: 13px;">Select a log from the list to see full details</p>
    </div>
  }
</div>
