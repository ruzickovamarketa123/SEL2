<div class="logs-list-container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
    <h4 style="margin: 0; color: #000000; ">YOUR TOUR LOGS</h4>
    <button type="button" (click)="openAddModal()"
    style="padding: 8px 18px; background: rgba(110, 219, 80, 0.8); color: rgb(0, 0, 0); border: 1.5px solid #000000; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer;
    ">+ add tour log</button>
  </div>

  <div style="display: flex; flex-direction: column; gap: 8px;">
    @for (log of filteredLogs(); track log.id) {
      <div (click)="selectLog(log)" 
           style="padding: 10px; border: 1px solid #eee; border-radius: 8px; cursor: pointer; transition: all 0.2s;"
           onmouseover="this.style.backgroundColor='#f8f9fa'" 
           onmouseout="this.style.backgroundColor='transparent'">
        <div style="display: flex; justify-content: space-between; font-size: 13px; font-weight: 600;">
          <span>{{ log.date | date:'dd MMM yyyy' }} - {{ log.time }}</span>
          <span style="color: #ffc107;">{{ log.rating }} ★</span>
        </div>
        <div style="font-size: 12px; color: #777; margin-top: 4px;">
          {{ log.totalDistance }} km • {{ log.difficulty }}
        </div>
      </div>
    } @empty{
        <p style="text-align: center; color: #bbb; margin-top: 20px;">NO PREVIOUS TOUR LOGS FOR THIS TOUR</p>
    }
  </div>
</div>

@if (showAddModal()) {
  <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
    <div style="background: white; border-radius: 12px; padding: 28px; width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);">
      <h3 style="margin: 0 0 20px 0; font-size: 20px; font-weight: 600;">add tour log</h3>

      <div style="display: flex; flex-direction: column; gap: 12px;">
        <div style="flex: 1;">
          <label style="font-size: 13px; font-weight: 500; color: #555;">date</label>
          <input type="date"
            [ngModel]="newLog().date"
            (ngModelChange)="newLog.set({...newLog(), date: $event})"
            style="width: 100%; padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px;" />
        </div>

        <div style="flex: 1;">
            <label style="font-size: 13px; font-weight: 500; color: #555;">time</label>
            <input type="time"
              [ngModel]="newLog().time"
              (ngModelChange)="newLog.set({...newLog(), time: $event})"
              style="width: 100%; padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px;" />
          </div>

        <div>
          <label style="font-size: 13px; font-weight: 500; color: #555;">distance (km)</label>
          <input type="number" min="0"
            [ngModel]="newLog().totalDistance"
            (ngModelChange)="newLog.set({...newLog(), totalDistance: +$event})"
            style="width: 100%; padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px;" />
        </div>

        <div>
          <label style="font-size: 13px; font-weight: 500; color: #555;">duration (minutes)</label>
          <input type="number" min="0"
            [ngModel]="newLog().totalTime"
            (ngModelChange)="newLog.set({...newLog(), totalTime: +$event})"
            style="width: 100%; padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px;" />
        </div>

        <div>
          <label style="font-size: 13px; font-weight: 500; color: #555;">difficulty</label>
          <select
            [ngModel]="newLog().difficulty"
            (ngModelChange)="newLog.set({...newLog(), difficulty: $event})"
            style="width: 100%; padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
            <option [ngValue]="null">-- select --</option>
            <option value="Easy">easy</option>
            <option value="Medium">medium</option>
            <option value="Hard">hard</option>
            <option value="Expert">expert</option>
          </select>
        </div>

        <div>
          <label style="font-size: 13px; font-weight: 500; color: #555;">rating (1–5)</label>
          <input type="number" min="1" max="5"
            [ngModel]="newLog().rating"
            (ngModelChange)="newLog.set({...newLog(), rating: +$event})"
            style="width: 100%; padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px;" />
        </div>

        <div>
          <label style="font-size: 13px; font-weight: 500; color: #555;">comment</label>
          <textarea rows="3"
            [ngModel]="newLog().comment"
            (ngModelChange)="newLog.set({...newLog(), comment: $event})"
            style="width: 100%; padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; resize: vertical; font-family: inherit;"></textarea>
        </div>
      </div>

       <div style="display: flex; justify-content: flex-end; gap: 10px;">
      <button type="button" (click)="closeAddModal()" style="
        padding: 9px 18px; border-radius: 8px;
        border: 1.5px solid #ddd; background: white;
        color: #555; font-size: 14px; cursor: pointer;
      ">cancel</button>

      <button type="button" (click)="confirmAdd()" [disabled]="!isNewLogValid()" style="
        padding: 9px 22px; border-radius: 8px;
        border: none; background: rgba(110, 219, 80);
        color: white; font-size: 14px; font-weight: 500; 
        ">add tour log</button>
    </div>

    </div>
  </div>
}
