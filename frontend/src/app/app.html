<div style="display: flex; flex-direction: column; height: 100vh;">
  
  <div style="padding: 16px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 10;">
    <search-input (searchChanged)="currentSearch = $event"
       (tourAdded)="onTourAdded($event)">
    </search-input>
  </div>

  <div style="flex: 1; overflow-y: auto; padding: 16px;">
    <list [searchTerm]="currentSearch" [tours]="tours"></list>
  </div>

</div>
