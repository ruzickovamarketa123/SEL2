<div style="display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-color: #f5f5f5;">

  <div style="display: flex; align-items: center; padding: 12px 16px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 10; gap: 12px;">
    
    <div style="flex: 0 0 66%;">
      <search-input
        (searchChanged)="currentSearch = $event"
        (tourAdded)="onTourAdded($event)">
      </search-input>
    </div>

    <div style="margin-left: auto; display: flex; gap: 8px; flex-shrink: 0;">
      <app-login></app-login>
      <app-register></app-register>
    </div>

  </div>

  <div style="display: flex; flex: 1; overflow: hidden;">

    <div style="width: 350px; overflow-y: auto; background: white; border-right: 1px solid #ddd; padding: 16px; flex-shrink: 0;">
      <list
        [searchTerm]="currentSearch"
        (tourSelected)="selectedTour = $event">
      </list>
    </div>

    <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">

      <div style="flex: 1; min-height: 0; padding: 16px 16px 0 16px;">
        <div style="height: 100%; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.12);">
          <!--<app-map [selectedTour]="selectedTour"></app-map>-->
        </div>
      </div>

      <div style="flex-shrink: 0; padding: 12px 16px 16px 16px;">
        <div *ngIf="!selectedTour" style="background: white; border-radius: 12px; padding: 20px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); color: #aaa; text-align: center;">
          <p style="margin: 0; font-size: 14px;">Select a tour from the list to see details here.</p>
        </div>
        <div *ngIf="selectedTour" style="background: white; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 350px;">
          
          <div style="display: flex; align-items: center; padding: 0 16px; background: #f8f9fa; border-bottom: 1px solid #eee;">
            <h3 style="margin: 0; font-size: 16px; margin-right: 20px;">{{selectedTour.name}}</h3>
            <button (click)="activeTab = 'details'" [style.border-bottom]="activeTab === 'details' ? '3px solid #007bff' : 'none'" style="padding: 12px; border:none; background:none; cursor:pointer; font-weight:bold;">Details</button>
            <button (click)="activeTab = 'logs'" [style.border-bottom]="activeTab === 'logs' ? '3px solid #007bff' : 'none'" style="padding: 12px; border:none; background:none; cursor:pointer; font-weight:bold;">Logs</button>
            <button (click)="selectedTour = null" style="margin-left: auto; border:none; background:none; cursor:pointer; font-size: 24px;">×</button>
          </div>

          <div style="flex: 1; overflow-y: auto; padding: 20px;">
            
            <div *ngIf="activeTab === 'details'">
              <tour_details [tour]="selectedTour"></tour_details>
            </div>

            <div *ngIf="activeTab === 'logs'" style="display: flex; gap: 20px; height: 100%;">
              <div style="flex: 1; border-right: 1px solid #eee; overflow-y: auto;">
                <tourlogs_list [tourId]="selectedTour.id" (logSelected)="selectedLog = $event"></tourlogs_list>
              </div>
              <div style="flex: 1.5; overflow-y: auto;">
                <tourlog_details [log]="selectedLog"></tourlog_details>
              </div>
            </div>
      </div>

    </div>
  </div>

</div>
